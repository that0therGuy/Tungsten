<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tungsten</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>

    <script src="
https://cdn.jsdelivr.net/npm/marked@17.0.3/lib/marked.umd.min.js
"></script>

</head>
<body>
<div class="nav">
    <div class="top">
        <h1 class="tung">Tungsten</h1>
        <div class="links">
            <a>Github</a>
            <a>More Activities</a>
        </div>

    </div>
</div>

<div class="container">

    <div class="middle">
        <div id="motionbar"><div><h4>For</h4></div><div>⚔️</div><div><h4>Against</h4></div></div>
        <div class="options-1">
            <select id="for">
                <option value="gpt-5.2">GPT 5.2</option>
                <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                <option value="x-ai/grok-4-1-fast">Grok 4.1 Fast</option>
                <option value="mistralai/codestral-2508">mistralai/codestral-2508</option>
                <option value="openrouter:deepseek/deepseek-chat-v3-0324">openrouter:deepseek/deepseek-chat-v3-0324</option>
                <option value="deepcogito/cogito-v2.1-671b">deepcogito/cogito-v2.1-671b</option>
                <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
                <option value="amazon/nova-2-lite-v1">amazon/nova-2-lite-v1</option>


                <option value="anthropic/claude-opus-4-6">anthropic/claude-opus-4-6</option>



            </select>
            <input type="text" placeholder="Agenda?" id="agenda">
            <select id="against">
                <option value="gpt-5.2">GPT 5.2</option>
                <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                <option value="x-ai/grok-4-1-fast">Grok 4.1 Fast</option>
                <option value="mistralai/codestral-2508">mistralai/codestral-2508</option>
                <option value="openrouter:deepseek/deepseek-chat-v3-0324">openrouter:deepseek/deepseek-chat-v3-0324</option>
                <option value="deepcogito/cogito-v2.1-671b">deepcogito/cogito-v2.1-671b</option>
                <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
                <option value="amazon/nova-2-lite-v1">amazon/nova-2-lite-v1</option>

                <option value="anthropic/claude-opus-4-6">anthropic/claude-opus-4-6</option>




            </select>
        </div>


        <div class="content">

                <div class="left"><p class="lp"></p></div>
                <div class="right"><p class="rp"></p></div>


        </div>
        <div class="options-2">
            <button id="run-button">Next Turn (for)</button>
        </div>

        <div style="    box-shadow: 0 0 30px rgba(27, 27, 27, 0.25);
display:flex; text-align: center;align-items: center; justify-content: center;">
            <div class="cn" style="flex:1;">Mediator Notes</div>
            <select id="commentator" style="flex:1;">
                <option value="gpt-5.2">GPT 5.2</option>
                <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                <option value="x-ai/grok-4-1-fast">Grok 4.1 Fast</option>
                <option value="mistralai/codestral-2508">mistralai/codestral-2508</option>
                <option value="openrouter:deepseek/deepseek-chat-v3-0324">openrouter:deepseek/deepseek-chat-v3-0324</option>
                <option value="deepcogito/cogito-v2.1-671b">deepcogito/cogito-v2.1-671b</option>


                <option value="amazon/nova-2-lite-v1">amazon/nova-2-lite-v1</option>

                <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>

                <option value="anthropic/claude-opus-4-6">anthropic/claude-opus-4-6</option>




            </select>
        </div>
        <div class="meds">
            <div class="l_med_cont"><p class="l_med"></p></div>
            <div class="r_med_cont"><p class="r_med"></p></div>

        </div>



    </div>


    <div class="bottom"></div>
</div>
<script src="index.js"></script>

</body>
</html>
